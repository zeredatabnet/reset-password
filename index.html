<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>የይለፍ ቃል መቀየር - Abnet Assistant</title>
  <!-- Load Supabase Official JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #563612, #A4834E);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 380px;
      text-align: center;
      border: 2px solid #967D55;
      box-sizing: border-box;
    }
    h2 { color: #3E200F; margin-bottom: 25px; font-size: 22px; }
    
    /* Password Input Wrapper for positioning the Eye Icon */
    .input-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
    input {
      width: 100%;
      padding: 12px 45px 12px 15px; /* Leave space on the right for eye icon */
      border: 1.5px solid #967D55;
      border-radius: 25px;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }
    /* The clickable Eye Icon style */
    .eye-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #967D55;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button {
      background: #4A260A;
      color: #EAD8B1;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
      box-sizing: border-box;
      margin-top: 10px;
    }
    button:hover { background: #351a06; }
    #message { margin-top: 15px; font-weight: bold; font-size: 14px; line-height: 1.5; }
    .success { color: #017209; }
    .error { color: #9E2A2B; }
  </style>
</head>
<body>

  <div class="card">
    <h2>አዲስ የይለፍ ቃል ያስገቡ <br>(Set New Password)</h2>
    
    <!-- Input 1: New Password -->
    <div class="input-wrapper">
      <input type="password" id="new-password" placeholder="አዲስ የይለፍ ቃል (New Password)" required minlength="6">
      <span class="eye-icon" onclick="toggleVisibility('new-password', this)">👁️</span>
    </div>

    <!-- Input 2: Confirm Password -->
    <div class="input-wrapper">
      <input type="password" id="confirm-password" placeholder="የይለፍ ቃል ማረጋገጫ (Confirm Password)" required minlength="6">
      <span class="eye-icon" onclick="toggleVisibility('confirm-password', this)">👁️</span>
    </div>

    <button onclick="updatePassword()">አስቀምጥ (Save Password)</button>
    <p id="message"></p>
  </div>

  <script>
    // Initialize Supabase
    const supabaseUrl = 'https://hdiavopcxtrowhowtooq.supabase.co';
    const supabaseAnonKey = 'sb_publishable_wMmTKAR0Xt5eEvMmxLFXOQ_2X2B59cW'; // Double check this is your full publishable key
    const _supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

    // Toggle Hide/Reveal Password function
    function toggleVisibility(inputId, iconElement) {
      const inputField = document.getElementById(inputId);
      if (inputField.type === "password") {
        inputField.type = "text";
        iconElement.innerText = "🙈"; // Eye closed
      } else {
        inputField.type = "password";
        iconElement.innerText = "👁️"; // Eye open
      }
    }

    // Run Diagnostics immediately when page loads
    window.onload = async function() {
      const messageElement = document.getElementById('message');
      
      const hash = window.location.hash.substring(1);
      const hashParams = new URLSearchParams(hash);
      const queryParams = new URLSearchParams(window.location.search);

      const accessToken = hashParams.get('access_token') || queryParams.get('access_token');
      const refreshToken = hashParams.get('refresh_token') || queryParams.get('refresh_token');
      const errorDescription = hashParams.get('error_description') || queryParams.get('error_description');

      if (errorDescription) {
        messageElement.className = 'error';
        messageElement.innerText = "Supabase Link Error: " + decodeURIComponent(errorDescription);
        return;
      }

      if (accessToken && refreshToken) {
        const { error } = await _supabase.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken
        });
        if (error) {
          messageElement.className = 'error';
          messageElement.innerText = "Session Setup Error: " + error.message;
        } else {
          messageElement.className = 'success';
          messageElement.innerText = "አካውንትዎ ተረጋግጧል! አሁን አዲሱን የይለፍ ቃል መጻፍ ይችላሉ። (Session verified! Enter your new password).";
        }
      } else {
        messageElement.className = 'error';
        let diagnosis = "ስህተት: ";
        if (queryParams.has('code')) {
          diagnosis += "Detected a PKCE '?code=' parameter. Your app is still running the old PKCE flow. Please perform a clean install of your Flutter app.";
        } else {
          diagnosis += "No tokens detected. Your email client may have stripped the security parameters. Copy the link and open it in a Chrome Incognito Tab.";
        }
        messageElement.innerText = diagnosis;
      }
    }

    async function updatePassword() {
      const password = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const messageElement = document.getElementById('message');

      if (password.length < 6) {
        messageElement.className = 'error';
        messageElement.innerText = "የይለፍ ቃል ቢያንስ 6 ቁምፊዎች መሆን አለበት (Password must be 6+ characters)";
        return;
      }

      // Check if both input boxes match
      if (password !== confirmPassword) {
        messageElement.className = 'error';
        messageElement.innerText = "ስህተት: ያስገቡት ሁለቱ የይለፍ ቃላት አይዛመዱም! (Error: Passwords do not match!)";
        return;
      }

      messageElement.innerText = "...በመጫን ላይ (Updating)...";
      messageElement.className = "";

      try {
        const { error } = await _supabase.auth.updateUser({ password: password });

        if (error) {
          messageElement.className = 'error';
          messageElement.innerText = "ስህተት ተፈጥሯል: " + error.message;
        } else {
          messageElement.className = 'success';
          messageElement.innerText = "የይለፍ ቃልዎ በትክክል ተቀይሯል! አሁን ወደ መተግበሪያው ገብተው ማጥናት ይችላሉ። (Success! You can now log into your app).";
          document.getElementById('new-password').parentElement.style.display = 'none';
          document.getElementById('confirm-password').parentElement.style.display = 'none';
          document.querySelector('button').style.display = 'none';
        }
      } catch (err) {
        messageElement.className = 'error';
        messageElement.innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
